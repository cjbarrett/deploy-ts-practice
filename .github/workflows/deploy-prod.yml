name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate SHA tag
        id: meta
        shell: bash
        run: |
          SHA_TAG=$(git rev-parse --short HEAD)
          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.SHA_TAG }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.SHA_TAG }}

      - name: Trigger Render deploy (production)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Show images
        run: docker images | grep deploy-ts-practice