name: CI Docker Build + Tagging + GHCR

on:
  push:
    branches: [main, feature/*]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        shell: bash
        run: |
          SHA_TAG=$(git rev-parse --short HEAD)
          BRANCH_TAG=$(echo "$GITHUB_REF_NAME" | tr '/' '-')

          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "BRANCH_TAG=$BRANCH_TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/cjbarrett/deploy-ts-practice:latest .

      - name: Tag image with SHA
        run: |
          docker tag ghcr.io/cjbarrett/deploy-ts-practice:latest \
            ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.SHA_TAG }}

      - name: Tag image with branch name
        run: |
          docker tag ghcr.io/cjbarrett/deploy-ts-practice:latest \
            ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.BRANCH_TAG }}

      - name: Push Docker images
        run: |
          docker push ghcr.io/cjbarrett/deploy-ts-practice:latest
          docker push ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.SHA_TAG }}
          docker push ghcr.io/cjbarrett/deploy-ts-practice:${{ steps.meta.outputs.BRANCH_TAG }}

      - name: Show images
        run: docker images | grep deploy-ts-practice