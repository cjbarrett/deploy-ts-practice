name: Deploy to Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  packages: write

jobs:
  staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging image
        run: |
          docker build \
            -t ghcr.io/cjbarrett/deploy-ts-practice:staging-latest .

      - name: Push staging image
        run: |
          docker push ghcr.io/cjbarrett/deploy-ts-practice:staging-latest